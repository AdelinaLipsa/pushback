<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="gA" cx="60%" cy="20%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#84cc16" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gB" cx="20%" cy="85%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0a0a0a"/>

  <!-- Ambient glows -->
  <rect width="1500" height="500" fill="url(#gA)"/>
  <rect width="1500" height="500" fill="url(#gB)"/>

  <!-- Left accent line -->
  <rect x="160" y="200" width="1" height="100" fill="#84cc16" opacity="0.3"/>

  <!-- Logo: centered -->
  <text
    x="750"
    y="250"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="108"
    letter-spacing="-4.3"
    text-anchor="middle"
    dominant-baseline="central"
  ><tspan fill="#fafafa">Pushback</tspan><tspan fill="#84cc16">.</tspan></text>

  <!-- Right accent line -->
  <rect x="1339" y="200" width="1" height="100" fill="#84cc16" opacity="0.3"/>
</svg>
