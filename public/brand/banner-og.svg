<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <radialGradient id="gA" cx="58%" cy="20%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#84cc16" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gB" cx="25%" cy="80%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="50%" cy="50%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#0a0a0a"/>

  <!-- Ambient glows -->
  <rect width="1200" height="628" fill="url(#gA)"/>
  <rect width="1200" height="628" fill="url(#gB)"/>
  <rect width="1200" height="628" fill="url(#gC)"/>

  <!-- Logo: centered slightly above middle -->
  <text
    x="600"
    y="284"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="112"
    letter-spacing="-4.5"
    text-anchor="middle"
    dominant-baseline="central"
  ><tspan fill="#fafafa">Pushback</tspan><tspan fill="#84cc16">.</tspan></text>

  <!-- Tagline -->
  <text
    x="600"
    y="378"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="20"
    letter-spacing="0.5"
    text-anchor="middle"
    dominant-baseline="central"
    fill="#52525b"
  >For freelancers who know their worth</text>

  <!-- URL -->
  <text
    x="600"
    y="578"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="14"
    letter-spacing="1"
    text-anchor="middle"
    dominant-baseline="central"
    fill="#3f3f46"
  >PUSHBACK.APP</text>
</svg>
