<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- White background variant — for print / light contexts -->
  <rect width="1000" height="1000" fill="#ffffff"/>

  <!-- Subtle lime tint in center -->
  <radialGradient id="gA" cx="50%" cy="50%" r="45%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#84cc16" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
  </radialGradient>
  <rect width="1000" height="1000" fill="url(#gA)"/>

  <!-- Logo: "Pushback." centered — dark text for light bg -->
  <text
    x="500"
    y="500"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="120"
    letter-spacing="-4.8"
    text-anchor="middle"
    dominant-baseline="central"
  ><tspan fill="#0a0a0a">Pushback</tspan><tspan fill="#84cc16">.</tspan></text>
</svg>
